name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Siehe desktop-release.yml / GitHub Changelog: Actions-Runtime Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  desktop-smoke:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Desktop electron-builder smoke (linux unpacked)
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: pnpm --filter desktop run dist:dir

  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Install pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Turbo boundaries
        run: pnpm exec turbo boundaries

      # PRs: only changed packages + dependents (--affected). main: full run.
      - name: Lint, typecheck, build
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec turbo run lint check-types build --affected
          else
            pnpm exec turbo run lint check-types build
          fi

      - name: Design guardrails
        run: pnpm exec turbo run lint:design-guardrails

      # PRs: install Chromium only if turbo would run @repo/playwright-web#e2e (saves time when web/UI unchanged).
      - name: Plan Playwright E2E
        id: playwright_e2e
        run: |
          if [ "${{ github.event_name }}" != "pull_request" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          JSON=$(pnpm exec turbo run e2e --affected --dry-run=json 2>&1 | sed '1d')
          N=$(echo "$JSON" | jq '[.tasks[] | select(.taskId == "@repo/playwright-web#e2e" and .command == "playwright test")] | length' 2>/dev/null) || true
          if ! [[ "${N:-}" =~ ^[0-9]+$ ]]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          if [ "$N" -gt 0 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Install Playwright browsers
        if: steps.playwright_e2e.outputs.run == 'true'
        run: pnpm --filter @repo/playwright-web exec playwright install --with-deps chromium

      - name: End-to-end tests
        if: steps.playwright_e2e.outputs.run == 'true'
        run: |
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            pnpm exec turbo run e2e --affected
          else
            pnpm exec turbo run e2e
          fi
