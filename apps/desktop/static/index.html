<!doctype html>
<html lang="de">
  <head>
    <meta charset="UTF-8" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; script-src 'self'"
    />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Desktop</title>
    <style>
      body {
        font-family:
          system-ui,
          -apple-system,
          sans-serif;
        margin: 2rem;
      }
    </style>
  </head>
  <body>
    <h1>Desktop</h1>
    <p id="status">Lade …</p>
    <script>
      const el = document.getElementById("status");
      window.desktop
        ?.ping()
        .then((msg) => {
          el.textContent = "IPC: " + msg;
        })
        .catch(() => {
          el.textContent = "IPC nicht erreichbar.";
        });
    </script>
  </body>
</html>
